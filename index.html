<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prime Duo Remote Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        
        body { 
            background: #0a0a0e; 
            background-image: radial-gradient(circle at 50% 0%, #1a1a24 0%, #0a0a0e 70%);
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 25px 20px;
            overflow-x: hidden;
        }

        /* --- HEADER --- */
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            width: 100%; 
            max-width: 400px;
        }
        .header h1 { 
            font-size: 1.8rem; 
            color: #fff; 
            font-weight: 900; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .header h1 span { color: #ffa500; }
        
        #status { 
            font-size: 0.75rem; 
            margin-top: 10px; 
            font-weight: 800; 
            color: #aaa; 
            background: rgba(255, 255, 255, 0.05); 
            display: inline-block; 
            padding: 8px 18px; 
            border-radius: 50px; 
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* --- CONTROL DASHBOARD --- */
        .container { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 100%; 
            max-width: 400px; 
            flex-grow: 1; 
        }

        .control-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .group-label {
            font-size: 0.7rem;
            color: #666;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* --- BUTTON BASE --- */
        button { 
            width: 100%; 
            padding: 18px 10px; 
            font-size: 1rem; 
            font-weight: 800; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        button:active { 
            transform: scale(0.95); 
            filter: brightness(1.2); 
        }

        /* --- SPECIFIC BUTTONS --- */
        .btn-capture { 
            background: linear-gradient(135deg, #ff8c00, #ff5e00); 
            color: #fff; 
            font-size: 1.6rem; 
            padding: 30px 10px; 
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(255, 94, 0, 0.4);
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            animation: pulseCapture 2.5s infinite;
        }
        @keyframes pulseCapture {
            0% { box-shadow: 0 0 0 0 rgba(255, 94, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 94, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 94, 0, 0); }
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-retake { background: rgba(231, 76, 60, 0.1); color: #ff4d4d; border: 2px solid rgba(231, 76, 60, 0.3); }
        .btn-good { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 2px solid rgba(46, 204, 113, 0.3); }
        
        .btn-another { background: rgba(52, 152, 219, 0.1); color: #3498db; border: 2px solid rgba(52, 152, 219, 0.3); }
        .btn-download { background: rgba(155, 89, 182, 0.1); color: #9b59b6; border: 2px solid rgba(155, 89, 182, 0.3); }

        .btn-new { 
            background: transparent; 
            color: #888; 
            border: 2px dashed #333; 
            margin-top: 10px;
            padding: 20px;
        }

        /* --- SUCCESS ANIMATION OVERRIDE --- */
        .success-anim {
            background: #2ecc71 !important;
            color: #000 !important;
            border-color: #27ae60 !important;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.5) !important;
            animation: none;
        }

        /* --- SUBTLE BRANDING --- */
        .brand-footer {
            margin-top: auto;
            padding-top: 30px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PRIME<span>DUO</span></h1>
        <div id="status">⏳ CONNECTING...</div>
    </div>

    <div class="container">
        
        <div class="control-group" style="padding: 10px; background: transparent; box-shadow: none; border: none;">
            <button class="btn-capture" onclick="sendCommand('CAPTURE', this)">📸 CAPTURE</button>
        </div>

        <div class="control-group">
            <div class="group-label">1. Review Shot</div>
            <div class="grid-2">
                <button class="btn-retake" onclick="sendCommand('RETAKE', this)">🔄 RETAKE</button>
                <button class="btn-good" onclick="sendCommand('LOOKS_GOOD', this)">✅ GOOD</button>
            </div>
        </div>

        <div class="control-group">
            <div class="group-label">2. Action</div>
            <div class="grid-2">
                <button class="btn-download" onclick="sendCommand('DOWNLOAD_JPG', this)">📥 SAVE JPG</button>
                <button class="btn-another" onclick="sendCommand('TAKE_ANOTHER', this)">📸 ANOTHER</button>
            </div>
        </div>

        <button class="btn-new" onclick="sendCommand('NEW_SESSION', this)">🏠 NEW SESSION</button>
    </div>

    <div class="brand-footer">
        // YUKI APPAREL PH //
    </div>

    <script>
        // 🚨 FIREBASE CONFIGURATION 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyDWwUzJUqYyoIpKdf1MH3mRmoTX9JKlJuE",
            authDomain: "qrcode-2e20e.firebaseapp.com",
            projectId: "qrcode-2e20e",
            databaseURL: "https://qrcode-2e20e-default-rtdb.firebaseio.com",
            storageBucket: "qrcode-2e20e.firebasestorage.app",
            messagingSenderId: "931181134675",
            appId: "1:931181134675:web:9657787b6ab0b1811857a6"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const statusEl = document.getElementById('status');

        // BANTAYAN ANG CONNECTION
        db.ref('.info/connected').on('value', function(snap) {
            if (snap.val() === true) {
                statusEl.innerHTML = "🟢 SYSTEM SYNCED";
                statusEl.style.color = "#2ecc71";
                statusEl.style.borderColor = "rgba(46, 204, 113, 0.3)";
                statusEl.style.background = "rgba(46, 204, 113, 0.1)";
            } else {
                statusEl.innerHTML = "🔴 OFFLINE";
                statusEl.style.color = "#ff4d4d";
                statusEl.style.borderColor = "rgba(231, 76, 60, 0.3)";
                statusEl.style.background = "rgba(231, 76, 60, 0.1)";
            }
        });

        // FUNCTION PARA MAG-SEND AT MAG-ANIMATE
        function sendCommand(action, btnElement) {
            db.ref('booth_command').set({
                action: action,
                time: Date.now()
            }).then(() => {
                // 1. Mag-vibrate ng 3 beses (mabilis) para ramdam sa kamay
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                // 2. I-save yung orihinal na text ng button
                const originalText = btnElement.innerHTML;

                // 3. Ilagay ang SUCCESS Animation
                btnElement.classList.add('success-anim');
                btnElement.innerHTML = "✅ SENT!";

                // 4. Ibalik sa normal pagkatapos ng kalahating segundo (500ms)
                setTimeout(() => {
                    btnElement.classList.remove('success-anim');
                    btnElement.innerHTML = originalText;
                }, 500);

            }).catch((err) => {
                console.error("Firebase Error:", err);
                alert("Hindi ma-send ang command!\nCheck internet or Firebase Rules.");
            });
        }
    </script>
</body>
</html>
